<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --primary: #00f0ff;
            --secondary: #ff00aa;
            --accent: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --card-bg: rgba(20, 20, 40, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-base);
        }

        .grid-lines {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            transform: perspective(500px) rotateX(60deg);
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            animation: float 15s infinite ease-in-out;
        }

        .particle.cyan {
            background: var(--primary);
            box-shadow: 0 0 60px var(--primary), 0 0 100px var(--primary);
        }

        .particle.magenta {
            background: var(--secondary);
            box-shadow: 0 0 60px var(--secondary), 0 0 100px var(--secondary);
        }

        .particle.green {
            background: var(--accent);
            box-shadow: 0 0 60px var(--accent), 0 0 100px var(--accent);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            25% { transform: translateY(-30px) translateX(20px) scale(1.1); }
            50% { transform: translateY(-10px) translateX(-20px) scale(0.9); }
            75% { transform: translateY(-40px) translateX(10px) scale(1.05); }
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbMove 10s infinite ease-in-out;
        }

        @keyframes orbMove {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-20px, 30px); }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 3px
            );
            opacity: 0.15;
        }

        /* Header */
        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.5); }
            50% { box-shadow: 0 0 50px rgba(0, 240, 255, 0.8), 0 0 80px rgba(255, 0, 170, 0.4); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Search Box */
        .search-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.1rem;
            font-family: 'Exo 2', sans-serif;
            background: rgba(10, 10, 20, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 15px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .url-input::placeholder {
            color: var(--text-secondary);
        }

        .process-btn {
            width: 100%;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .process-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .process-btn:hover::before {
            left: 100%;
        }

        .process-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.6), 0 0 100px rgba(255, 0, 170, 0.3);
        }

        .process-btn:active {
            transform: scale(0.98);
        }

        .process-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 50px;
            height: 50px;
            margin: 30px auto;
            position: relative;
        }

        .loader.active {
            display: block;
        }

        .loader::before,
        .loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader::before {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation-delay: -0.45s;
        }

        .loader::after {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            background: var(--bg-base);
            animation-delay: -0.9s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-msg {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.5);
            border-radius: 10px;
            padding: 15px 20px;
            margin-top: 20px;
            color: #ff6b6b;
            display: none;
            animation: shake 0.5s ease;
        }

        .error-msg.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Video Result */
        .result-container {
            display: none;
            animation: slideUp 0.5s ease;
        }

        .result-container.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
        }

        .video-info {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .video-thumbnail {
            width: 200px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .video-details {
            flex: 1;
            min-width: 200px;
        }

        .video-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .video-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .video-meta span {
            display: inline-block;
            margin-right: 20px;
        }

        .video-meta i {
            color: var(--accent);
        }

        /* Format Selection */
        .format-section {
            margin-top: 20px;
        }

        .format-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .format-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .format-btn {
            padding: 12px 25px;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(10, 10, 20, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .format-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .format-btn.active {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 170, 0.2));
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }

        .quality-select {
            padding: 12px 20px;
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            background: rgba(10, 10, 20, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            margin-right: 15px;
        }

        .quality-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .download-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border: none;
            border-radius: 12px;
            color: var(--bg-base);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
        }

        .download-btn.downloading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
            }

            .logo {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 20px 15px;
            }

            .search-container {
                padding: 20px;
            }

            .url-input {
                padding: 15px 20px;
                font-size: 1rem;
            }

            .process-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }

            .video-info {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .video-thumbnail {
                width: 100%;
                max-width: 300px;
                height: auto;
            }

            .video-title {
                font-size: 1.1rem;
            }

            .format-options {
                justify-content: center;
            }

            .download-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3rem;
            }

            .format-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }

            .quality-select {
                width: 100%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background">
        <div class="grid-lines"></div>
        <div class="particles" id="particles"></div>
        <div class="glow-orb" style="width: 400px; height: 400px; background: var(--primary); top: 10%; left: 10%;"></div>
        <div class="glow-orb" style="width: 300px; height: 300px; background: var(--secondary); bottom: 20%; right: 15%; animation-delay: -5s;"></div>
        <div class="glow-orb" style="width: 250px; height: 250px; background: var(--accent); top: 50%; left: 60%; animation-delay: -2s;"></div>
    </div>

    <div class="scanlines"></div>

    <!-- Header -->
    <header>
        <div class="logo">YT</div>
        <h1>YouTube Downloader Pro</h1>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Search Section -->
        <div class="search-container">
            <div class="input-wrapper">
                <input type="text" class="url-input" id="urlInput" placeholder="Paste YouTube URL here..." autocomplete="off">
            </div>
            <button class="process-btn" id="processBtn" onclick="processUrl()">Process Video</button>

            <div class="loader" id="loader"></div>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <!-- Result Section -->
        <div class="result-container" id="resultContainer">
            <div class="video-card">
                <div class="video-info">
                    <img src="" alt="Thumbnail" class="video-thumbnail" id="videoThumbnail">
                    <div class="video-details">
                        <h2 class="video-title" id="videoTitle"></h2>
                        <div class="video-meta">
                            <span><i class="duration-icon"></i> Duration: <span id="videoDuration"></span></span>
                        </div>
                    </div>
                </div>

                <div class="format-section">
                    <h3 class="format-title">Select Format</h3>
                    <div class="format-options">
                        <button class="format-btn active" data-format="mp4" onclick="selectFormat('mp4')">MP4 Video</button>
                        <button class="format-btn" data-format="mp3" onclick="selectFormat('mp3')">MP3 Audio</button>
                    </div>

                    <div class="quality-options" id="qualityOptions">
                        <select class="quality-select" id="qualitySelect">
                            <option value="1080p">1080p HD</option>
                            <option value="720p" selected>720p HD</option>
                            <option value="480p">480p</option>
                            <option value="360p">360p</option>
                        </select>
                    </div>

                    <button class="download-btn" id="downloadBtn" onclick="downloadMedia()">
                        Download Now
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>YouTube Downloader Pro &copy; 2026</p>
    </footer>

    <script>
        // Generate particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['cyan', 'magenta', 'green'];
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;

                const size = Math.random() * 15 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 15}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;

                container.appendChild(particle);
            }
        }

        createParticles();

        // Variables
        let currentFormat = 'mp4';
        let videoData = null;

        // Process URL
        async function processUrl() {
            const urlInput = document.getElementById('urlInput');
            const processBtn = document.getElementById('processBtn');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');

            const url = urlInput.value.trim();

            // Reset UI
            errorMsg.classList.remove('show');
            resultContainer.classList.remove('show');
            videoData = null;

            if (!url) {
                showError('Please enter a YouTube URL');
                return;
            }

            // Show loader
            processBtn.disabled = true;
            processBtn.textContent = 'Processing...';
            loader.classList.add('active');

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error processing URL');
                }

                videoData = data.video;

                // Update UI with video info
                document.getElementById('videoTitle').textContent = videoData.title;
                document.getElementById('videoDuration').textContent = videoData.duration_formatted;

                if (videoData.thumbnail) {
                    document.getElementById('videoThumbnail').src = videoData.thumbnail;
                }

                resultContainer.classList.add('show');

            } catch (error) {
                showError(error.message);
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = 'Process Video';
                loader.classList.remove('active');
            }
        }

        // Show error
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        // Select format
        function selectFormat(format) {
            currentFormat = format;

            // Update buttons
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.format === format) {
                    btn.classList.add('active');
                }
            });

            // Show/hide quality options
            const qualityOptions = document.getElementById('qualityOptions');
            if (format === 'mp3') {
                qualityOptions.style.display = 'none';
            } else {
                qualityOptions.style.display = 'inline-block';
            }
        }

        // Download media
        async function downloadMedia() {
            const downloadBtn = document.getElementById('downloadBtn');

            if (!videoData) {
                showError('No video selected');
                return;
            }

            downloadBtn.textContent = 'Downloading...';
            downloadBtn.classList.add('downloading');

            try {
                const quality = document.getElementById('qualitySelect').value;

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: videoData.url,
                        format: currentFormat,
                        quality: quality
                    })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Download failed');
                }

                // Handle file download
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;

                // Set filename
                let filename = videoData.title;
                // Remove invalid characters
                filename = filename.replace(/[<>:"/\\|?*]/g, '');
                filename = filename.substring(0, 50); // Limit length

                if (currentFormat === 'mp3') {
                    filename += '.mp3';
                } else {
                    filename += '.mp4';
                }

                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(downloadUrl);
                document.body.removeChild(a);

                downloadBtn.textContent = 'Download Complete!';

                setTimeout(() => {
                    downloadBtn.textContent = 'Download Now';
                    downloadBtn.classList.remove('downloading');
                }, 3000);

            } catch (error) {
                showError(error.message);
                downloadBtn.textContent = 'Download Now';
                downloadBtn.classList.remove('downloading');
            }
        }

        // Handle Enter key
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processUrl();
            }
        });

        // Initialize quality options visibility
        document.getElementById('qualityOptions').style.display = 'inline-block';
    </script>
</body>
</html>
